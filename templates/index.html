<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOPE WARS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #1a1a1a;
      --accent: #e8c840;
      --accent2: #e05c2a;
      --green: #2ecc71;
      --red: #e74c3c;
      --text: #f5f0e8;
      --muted: #999;
      --border: #2a2a2a;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 30px;
      line-height: 1.4;
      overflow: hidden;
    }
    h1, .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }

    /* HEADER */
    .header {
      background: var(--bg2);
      border-bottom: 2px solid var(--accent);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 28px; color: var(--accent); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 4px;
    }
    .stat { text-align: center; }
    .stat-clickable { cursor: pointer; }
    .stat-clickable:hover .stat-val { opacity: 0.8; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .stat-val { font-size: 16px; color: var(--accent); font-weight: bold; }
    .stat-val.danger { color: var(--red); }
    .stat-hint { font-size: 12px; color: var(--muted); }
    .stat-tray {
      display: none;
      flex-direction: column;
      gap: 3px;
      margin-top: 6px;
    }
    .stat-tray.visible { display: flex; }
    .stat-tray button {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 4px 6px;
      cursor: pointer;
    }
    .stat-tray button:hover { background: var(--accent); color: #000; }
    .stat-tray button.danger { border-color: var(--red); color: var(--red); }
    .stat-tray button.danger:hover { background: var(--red); color: #fff; }

    /* LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 52px);
      overflow: hidden;
    }
    .panel {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 14px;
    }
    .panel:last-child { border-right: none; }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
      padding-bottom: 4px;
      letter-spacing: 2px;
    }

    /* MARKET */
    .drug-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }
    .drug-name { font-size: 18px; font-weight: bold; color: var(--text); }
    .drug-alias { color: var(--muted); font-size: 15px; }
    .drug-avail { font-size: 15px; color: var(--muted); }
    .drug-price { font-size: 18px; color: var(--green); min-width: 75px; text-align: right; }
    .drug-price.high { color: var(--red); }
    .buy-group { display: flex; align-items: center; gap: 3px; }
    .qty-in {
      width: 40px;
      text-align: center;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      padding: 3px 2px;
    }
    .qty-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 9px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      transition: background 0.1s, color 0.1s;
    }
    .qty-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    .qty-btn:disabled { opacity: 0.3; cursor: default; }
    .qty-btn:disabled:hover { background: var(--bg3); color: var(--text); border-color: var(--border); }
    .trend { font-size: 15px; margin-left: 3px; }
    .trend-up { color: var(--red); }
    .trend-down { color: var(--green); }

    /* STASH */
    .owned-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .pill {
      display: inline-block;
      padding: 1px 7px;
      font-size: 10px;
      border-radius: 2px;
    }
    .pill-good { background: #1a3a1a; color: var(--green); border: 1px solid #2d5a2d; }
    .pill-bad  { background: #3a1a1a; color: var(--red);   border: 1px solid #5a2d2d; }

    /* CITY GRID */
    .top-section { min-height: 200px; margin-bottom: 0; }
    .city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .city-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 9px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
      user-select: none;
    }
    .city-btn:hover { border-color: var(--accent); color: var(--accent); }
    .city-btn.current { border-color: var(--accent); background: #1a1600; color: var(--accent); cursor: default; }
    .city-name { font-size: 13px; font-weight: bold; }
    .city-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .city-btn.current .city-desc { color: var(--accent); opacity: 0.6; }

    /* ACTIONS */
    .action-bar { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; }
    .action-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .action-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    .action-btn.danger { border-color: #5a2020; }
    .action-btn.danger:hover { background: var(--red); color: #fff; border-color: var(--red); }
    .loan-info {
      background: var(--bg3);
      border: 1px solid var(--accent2);
      padding: 8px 10px;
      margin: 8px 0;
      font-size: 11px;
      color: var(--muted);
    }
    .loan-info .debt-num { color: var(--red); font-weight: bold; }

    /* LOG */
    .log {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 8px;
      min-height: 90px;
      max-height: 140px;
      overflow-y: auto;
      font-size: 17px;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #161616; }
    .log-entry.good { color: var(--green); }
    .log-entry.bad  { color: var(--red); }
    .log-entry.warn { color: var(--accent); }
    .log-entry.headline { color: var(--muted); font-style: italic; }

    hr.div { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* MODAL OVERLAY */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg2);
      border: 2px solid var(--accent2);
      padding: 28px 24px;
      max-width: 380px;
      width: 92%;
      text-align: center;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--accent2);
      margin-bottom: 12px;
    }
    .modal-msg { margin-bottom: 20px; line-height: 1.7; color: var(--text); }
    .modal-ok {
      background: var(--accent); color: #000;
      border: none; padding: 9px 28px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; cursor: pointer; letter-spacing: 1px;
    }
    .modal-ok:hover { background: #f0d050; }

    /* GAME OVER */
    .gameover { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .gameover.hidden { display: none; }
    .go-box { background: var(--bg2); border: 2px solid var(--accent); padding: 36px 28px; max-width: 520px; width: 92%; text-align: center; }
    .go-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--accent); line-height: 1; margin-bottom: 10px; }
    .go-score { font-size: 13px; line-height: 2; margin-bottom: 24px; color: var(--text); }
    .go-score strong { color: var(--accent); font-size: 16px; }

    /* INPUT DIALOG */
    .input-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 150;
    }
    .input-overlay.hidden { display: none; }
    .input-box {
      background: var(--bg2); border: 2px solid var(--accent);
      padding: 24px; max-width: 320px; width: 90%; text-align: center;
    }
    .input-box label {
      display: block;
      font-family: 'Bebas Neue', sans-serif; font-size: 20px;
      color: var(--accent); margin-bottom: 12px;
    }
    .input-box input[type=number] {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: 'Share Tech Mono', monospace;
      font-size: 18px; padding: 8px; text-align: center; margin-bottom: 14px;
    }
    .input-box .btn-row { display: flex; gap: 8px; justify-content: center; }
    .input-confirm { background: var(--accent); color: #000; border: none; padding: 7px 22px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; }
    .input-cancel  { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 7px 22px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; }
    .input-cancel:hover { background: var(--red); color: #fff; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* SETTINGS */
    .setting-row { margin-bottom: 16px; }
    .setting-label { display:block; font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    .setting-opts { display:flex; gap:6px; }
    .sopt {
      flex:1; background:var(--bg3); border:1px solid var(--border);
      color:var(--muted); font-family:'Share Tech Mono',monospace;
      font-size:13px; padding:8px 4px; cursor:pointer; text-align:center; line-height:1.4;
    }
    .sopt span { font-size:11px; color:var(--muted); }
    .sopt:hover { border-color:var(--accent); color:var(--text); }
    .sopt.active { border-color:var(--accent); background:#1a1600; color:var(--accent); }
    .sopt.active span { color:var(--accent); opacity:0.7; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .main { grid-template-columns: 1fr; height: auto; overflow: visible; }
      html, body { overflow: auto; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .panel { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>DOPE WARS</h1>
    <div class="header-sub" id="headerSub">NEW YORK CITY &bull; 1984</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="action-btn" onclick="openSettings()" style="font-size:13px;padding:4px 10px;border-color:var(--muted)">⚙ SETTINGS</button>
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--muted)">DAY</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1" id="dayDisplay">1</div>
      <div style="font-size:10px;color:var(--muted)" id="daysLeft">29 days left</div>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main">

  <!-- LEFT: TRAVEL + MARKET -->
  <div class="panel">
    <div class="top-section" id="topLeft">
      <div class="panel-title" id="travelTitle">Travel — <span id="cityDisplay">Bronx</span></div>
      <div class="city-grid" id="cityGrid"></div>
    </div>

    <hr class="div">
    <div class="panel-title">Market</div>
    <div id="marketList"></div>
  </div>

  <!-- RIGHT: STATS + STASH + SHOP + LOG -->
  <div class="panel">
    <div class="top-section" id="topRight">
      <div class="panel-title">Finances</div>
      <div class="stats-bar">
        <div class="stat stat-clickable" onclick="toggleTray('cash')">
          <div class="stat-label">Cash <span class="stat-hint">▾</span></div>
          <div class="stat-val" id="cashDisplay">$2,000</div>
          <div class="stat-tray" id="tray-cash">
            <button onclick="closeTray();openInput('deposit','Deposit how much?')">Deposit</button>
            <button onclick="closeTray();openInput('withdraw','Withdraw how much?')">Withdraw</button>
            <button onclick="closeTray();withdrawAll()">Withdraw all</button>
          </div>
        </div>
        <div class="stat"><div class="stat-label">Bank</div><div class="stat-val" id="bankDisplay">$0</div></div>
        <div class="stat stat-clickable" onclick="toggleTray('debt')">
          <div class="stat-label">Debt <span class="stat-hint">▾</span></div>
          <div class="stat-val danger" id="debtDisplay">$5,000</div>
          <div class="stat-tray" id="tray-debt">
            <button onclick="closeTray();openInput('borrow','Borrow how much?')">Borrow more</button>
            <button class="danger" onclick="closeTray();openInput('pay_debt','Pay how much on debt?')">Pay partial</button>
            <button class="danger" onclick="closeTray();payAllLoan()">Pay all</button>
          </div>
        </div>
        <div class="stat"><div class="stat-label">Coat / Space</div><div class="stat-val" id="coatDisplay">0 / 100</div></div>
      </div>
    </div>

    <hr class="div">
    <div class="panel-title">Your Stash</div>
    <div id="stashList" style="color:var(--muted)">Empty pockets.</div>

    <hr class="div">
    <div class="panel-title">Black Market</div>
    <div id="shopList"></div>
    <div id="upgradeStatus" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>

    <div class="panel-title">Street News</div>
    <div class="log" id="log"></div>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="overlay hidden" id="eventOverlay">
  <div class="modal-box">
    <div class="modal-title" id="eventTitle">EVENT</div>
    <div class="modal-msg" id="eventMsg"></div>
    <button class="modal-ok" onclick="dismissEvent()">OK, GOT IT</button>
  </div>
</div>

<!-- COAT OFFER MODAL -->
<div class="overlay hidden" id="coatOverlay">
  <div class="modal-box">
    <div class="modal-title">STREET OFFER</div>
    <div class="modal-msg" id="coatOfferMsg"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="modal-ok" onclick="acceptCoatOffer()">BUY IT</button>
      <button class="modal-ok" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="declineCoatOffer()">PASS</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay hidden" id="settingsOverlay">
  <div class="modal-box" style="max-width:500px;text-align:left">
    <div class="modal-title" style="margin-bottom:16px">SETTINGS</div>

    <div class="setting-row">
      <label class="setting-label">Game Length</label>
      <div class="setting-opts" id="set-days">
        <button class="sopt active" data-val="30">30 days<br><span>Standard</span></button>
        <button class="sopt" data-val="60">60 days<br><span>Extended</span></button>
        <button class="sopt" data-val="90">90 days<br><span>Marathon</span></button>
      </div>
    </div>
    <div class="setting-row">
      <label class="setting-label">Starting Cash</label>
      <div class="setting-opts" id="set-cash">
        <button class="sopt active" data-val="2000">$2,000<br><span>Standard</span></button>
        <button class="sopt" data-val="5000">$5,000<br><span>Head start</span></button>
        <button class="sopt" data-val="500">$500<br><span>Hardcore</span></button>
      </div>
    </div>
    <div class="setting-row">
      <label class="setting-label">Starting Debt</label>
      <div class="setting-opts" id="set-debt">
        <button class="sopt active" data-val="5000">$5,000<br><span>Standard</span></button>
        <button class="sopt" data-val="0">$0<br><span>Clean slate</span></button>
        <button class="sopt" data-val="15000">$15,000<br><span>Deep in it</span></button>
      </div>
    </div>
    <div class="setting-row">
      <label class="setting-label">Daily Interest Rate</label>
      <div class="setting-opts" id="set-interest">
        <button class="sopt active" data-val="1.10">10%<br><span>Standard</span></button>
        <button class="sopt" data-val="1.05">5%<br><span>Relaxed</span></button>
        <button class="sopt" data-val="1.20">20%<br><span>Brutal</span></button>
      </div>
    </div>
    <div class="setting-row">
      <label class="setting-label">Event Frequency</label>
      <div class="setting-opts" id="set-events">
        <button class="sopt active" data-val="0.38">Normal<br><span>38% chance</span></button>
        <button class="sopt" data-val="0.20">Quiet<br><span>20% chance</span></button>
        <button class="sopt" data-val="0.60">Chaotic<br><span>60% chance</span></button>
      </div>
    </div>
    <div class="setting-row">
      <label class="setting-label">Starting Carry Capacity</label>
      <div class="setting-opts" id="set-coat">
        <button class="sopt active" data-val="100">100<br><span>Standard</span></button>
        <button class="sopt" data-val="50">50<br><span>Tight</span></button>
        <button class="sopt" data-val="200">200<br><span>Loaded</span></button>
      </div>
    </div>

    <button class="modal-ok" style="width:100%;margin-top:18px;font-size:20px" onclick="startFromSettings()">START GAME</button>
  </div>
</div>

<!-- CUSTOM INPUT DIALOG -->
<div class="input-overlay hidden" id="inputOverlay">
  <div class="input-box">
    <label id="inputLabel">Amount</label>
    <input type="number" id="inputField" min="0" value="0">
    <div class="btn-row">
      <button class="input-confirm" onclick="confirmInput()">CONFIRM</button>
      <button class="input-cancel" onclick="closeInput()">CANCEL</button>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div class="gameover hidden" id="gameOver">
  <div class="go-box">
    <div class="go-title" id="goTitle">GAME OVER</div>
    <div class="go-score" id="goScore"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">
      <button class="modal-ok" onclick="openSettings()">PLAY AGAIN</button>
      <button class="modal-ok" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="document.getElementById('gameOver').classList.add('hidden');openSettings()">CHANGE SETTINGS</button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">HIGH SCORES</div>
      <div id="highScoreTable"></div>
    </div>
  </div>
</div>

<script>
  /* ─── CONSTANTS (for rendering) ─── */
  const DRUGS = [
    { name:'Cocaine', base:15000, variance:0.5, street:'Snow'    },
    { name:'Heroin',  base:5000,  variance:0.6, street:'Horse'   },
    { name:'Acid',    base:1000,  variance:0.8, street:'Blotter' },
    { name:'Weed',    base:300,   variance:0.5, street:'Grass'   },
    { name:'Speed',   base:90,    variance:0.7, street:'Crank'   },
    { name:'Ludes',   base:15,    variance:0.8, street:'Buttons' },
    { name:'Shrooms', base:750,   variance:0.6, street:'Caps'    },
    { name:'PCP',     base:1000,  variance:0.7, street:'Dust'    },
  ];
  const CITIES = [
    { name:'Bronx',     desc:'Home turf'   },
    { name:'Manhattan', desc:'Big money'   },
    { name:'Brooklyn',  desc:'Rough crowd' },
    { name:'Queens',    desc:'Quiet spots' },
    { name:'Harlem',    desc:'Hot market'  },
    { name:'Staten Is.',desc:'Slow days'   },
  ];
  const UPGRADES = [
    { id:'gun',      label:'9mm Pistol',      price:1500, desc:'Halves bust losses. 60% chance to scare off muggers.' },
    { id:'burner',   label:'Burner Phone',    price:500,  desc:'Better connect info — nearly full drug selection every market.' },
    { id:'car',      label:'Stolen Honda',    price:3000, desc:'3 free trips per day — travel without losing a day.' },
    { id:'supplier', label:'Supplier Contact',price:2000, desc:'Once per day, buy any drug at 50% of market price.' },
  ];
  const CAR_FREE_TRIPS = 3;

  /* ─── STATE ─── */
  let S = {};
  let inputAction = null;

  /* ─── HELPERS ─── */
  const fmt     = n => '$' + Math.abs(Math.round(n)).toLocaleString();
  const carried = () => Object.values(S.stash || {}).reduce((a, b) => a + b, 0);

  /* ─── API ─── */
  async function api(path, body = null) {
    const opts = body != null
      ? { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }
      : { method:'GET' };
    const r = await fetch('/api/' + path, opts);
    if (!r.ok) { console.error('API error', path, r.status); return S; }
    return r.json();
  }

  /* ─── STATE APPLICATION ─── */
  async function applyState(s) {
    const ev = s.triggered_event;
    delete s.triggered_event;
    S = s;
    renderAll();
    if (ev) {
      showEvent(ev.title, ev.msg);
    } else if (S.pending_coat_offer) {
      showCoatOffer(S.pending_coat_offer);
    } else if (S.game_over) {
      await doGameOver();
    }
  }

  /* ─── TRAVEL ─── */
  async function travel(city) {
    const s = await api('travel', { city });
    await applyState(s);
  }

  /* ─── BUY / SELL ─── */
  async function buyDrug(name) {
    const el = document.getElementById('qty_' + name);
    const qty = parseInt(el ? el.value : 1) || 1;
    const s = await api('buy', { name, qty });
    applyState(s);
  }

  async function buyMax(name) {
    const s = await api('buy_max', { name });
    applyState(s);
  }

  async function supplierBuy(name) {
    const s = await api('supplier_buy', { name });
    applyState(s);
  }

  async function sellDrug(name) {
    const el = document.getElementById('sqty_' + name);
    const qty = parseInt(el ? el.value : 1) || 1;
    const s = await api('sell', { name, qty });
    applyState(s);
  }

  /* ─── BANKING ─── */
  async function withdrawAll() {
    const s = await api('withdraw', {});
    applyState(s);
  }

  async function payAllLoan() {
    const s = await api('pay_debt', {});
    applyState(s);
  }

  /* ─── UPGRADES ─── */
  async function buyUpgrade(id) {
    const s = await api('buy_upgrade', { id });
    applyState(s);
  }

  /* ─── INPUT DIALOG ─── */
  function openInput(action, labelText) {
    inputAction = action;
    document.getElementById('inputLabel').textContent = labelText;
    document.getElementById('inputField').value = 0;
    document.getElementById('inputOverlay').classList.remove('hidden');
    document.getElementById('inputField').focus();
  }

  function closeInput() {
    inputAction = null;
    document.getElementById('inputOverlay').classList.add('hidden');
  }

  async function confirmInput() {
    const amt    = parseInt(document.getElementById('inputField').value) || 0;
    const action = inputAction;
    closeInput();
    if (amt <= 0) return;
    let s;
    if      (action === 'deposit')  s = await api('deposit',  { amount: amt });
    else if (action === 'withdraw') s = await api('withdraw', { amount: amt });
    else if (action === 'pay_debt') s = await api('pay_debt', { amount: amt });
    else if (action === 'borrow')   s = await api('borrow',   { amount: amt });
    if (s) applyState(s);
  }

  /* ─── MODALS ─── */
  function showEvent(title, msg) {
    document.getElementById('eventTitle').textContent = title;
    document.getElementById('eventMsg').textContent   = msg;
    document.getElementById('eventOverlay').classList.remove('hidden');
  }

  function dismissEvent() {
    document.getElementById('eventOverlay').classList.add('hidden');
    if (S.pending_coat_offer) {
      showCoatOffer(S.pending_coat_offer);
    } else if (S.game_over) {
      doGameOver();
    }
  }

  function showCoatOffer(offer) {
    document.getElementById('coatOfferMsg').textContent =
      `${offer.desc}. +${offer.capacity} carry capacity for ${fmt(offer.price)}. Interested?`;
    document.getElementById('coatOverlay').classList.remove('hidden');
  }

  async function acceptCoatOffer() {
    document.getElementById('coatOverlay').classList.add('hidden');
    const s = await api('coat_offer', { accept: true });
    S = s; renderAll();
    if (S.game_over) doGameOver();
  }

  async function declineCoatOffer() {
    document.getElementById('coatOverlay').classList.add('hidden');
    const s = await api('coat_offer', { accept: false });
    S = s; renderAll();
    if (S.game_over) doGameOver();
  }

  /* ─── SETTINGS ─── */
  function openSettings() {
    document.getElementById('gameOver').classList.add('hidden');
    document.getElementById('settingsOverlay').classList.remove('hidden');
  }

  document.querySelectorAll('.sopt').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.setting-opts').querySelectorAll('.sopt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  async function startFromSettings() {
    const pick = id => parseFloat(document.querySelector('#' + id + ' .sopt.active').dataset.val);
    const settings = {
      days:     pick('set-days'),
      cash:     pick('set-cash'),
      debt:     pick('set-debt'),
      interest: pick('set-interest'),
      events:   pick('set-events'),
      coat:     pick('set-coat'),
    };
    document.getElementById('settingsOverlay').classList.add('hidden');
    const s = await api('new_game', settings);
    applyState(s);
  }

  /* ─── GAME OVER ─── */
  async function doGameOver() {
    const net = S.cash + S.bank - S.debt;
    let title, flavor;
    if      (net > 100000) { title = 'KINGPIN!';       flavor = 'You OWN these streets. Nobody moves product without your say-so.'; }
    else if (net > 50000)  { title = 'MADE MAN';       flavor = 'Big earner. The bosses are watching. Keep it up.'; }
    else if (net > 10000)  { title = 'STREET HUSTLER'; flavor = 'Not bad. You survived and came out ahead.'; }
    else if (net > 0)      { title = 'SURVIVOR';       flavor = 'You made it out alive — barely. Try harder next time.'; }
    else                   { title = 'BROKE & BURIED'; flavor = 'The loan shark owns everything you had. Game over for real.'; }

    document.getElementById('goTitle').textContent = title;
    document.getElementById('goScore').innerHTML =
      `Cash on hand: ${fmt(S.cash)}<br>` +
      `Bank: ${fmt(S.bank)}<br>` +
      `Debt owed: &minus;${fmt(S.debt)}<br><br>` +
      `<strong>Net Worth: ${fmt(net)}</strong><br><br>` +
      flavor;

    const scores = await api('save_score', {});
    renderHighScores(scores);
    document.getElementById('gameOver').classList.remove('hidden');
  }

  function renderHighScores(scores) {
    const el = document.getElementById('highScoreTable');
    if (!scores || !scores.length) {
      el.innerHTML = '<div style="color:var(--muted);font-size:13px">No scores yet.</div>';
      return;
    }
    el.innerHTML = scores.map((s, i) => {
      const rank  = i === 0 ? '👑' : `#${i + 1}`;
      const color = s.net > 0 ? 'var(--green)' : 'var(--red)';
      const interestPct = Math.round((s.interest - 1) * 100);
      return `<div style="display:grid;grid-template-columns:28px 1fr auto;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="font-size:14px">${rank}</span>
        <span style="color:var(--muted)">${s.days}d &middot; $${s.cash.toLocaleString()} start &middot; ${interestPct}% int &middot; ${s.date}</span>
        <span style="color:${color};font-weight:bold">${fmt(s.net)}</span>
      </div>`;
    }).join('');
  }

  /* ─── RENDER ─── */
  function renderAll() {
    const c = carried();
    const interestPct = S.interest ? Math.round((S.interest - 1) * 100) : 10;

    document.getElementById('dayDisplay').textContent  = S.day;
    document.getElementById('daysLeft').textContent    = (S.max_days - S.day) + ' days left';
    document.getElementById('cashDisplay').textContent = fmt(S.cash);
    document.getElementById('bankDisplay').textContent = fmt(S.bank);
    document.getElementById('debtDisplay').textContent = fmt(S.debt);
    document.getElementById('coatDisplay').textContent = c + ' / ' + S.coat;
    document.getElementById('headerSub').textContent   =
      `${S.max_days} DAYS TO MAKE YOUR FORTUNE \u2022 NEW YORK CITY \u2022 1984 \u2022 ${interestPct}%/DAY INTEREST`;

    const badges = [
      S.has_gun      && '🔫 Gun',
      S.has_burner   && '📱 Burner',
      S.has_car      && '🚗 Car',
      S.has_supplier && ('📞 Connect' + (S.supplier_used_today ? ' (used)' : ' (ready)')),
    ].filter(Boolean);
    document.getElementById('upgradeStatus').textContent = badges.length ? 'Owned: ' + badges.join(' · ') : '';

    renderMarket();
    renderStash();
    renderShop();
    renderCities();
    renderLog();
    syncTopSections();
  }

  function renderMarket() {
    const ml = document.getElementById('marketList');
    ml.innerHTML = '';
    let count = 0;
    DRUGS.forEach(d => {
      if (!S.prices || !S.prices[d.name]) return;
      count++;
      const price   = S.prices[d.name];
      const prev    = S.prev_prices && S.prev_prices[d.name];
      const isHigh  = price > d.base * 1.5;
      const avail   = S.market[d.name] || 0;
      const c       = carried();
      const space   = S.coat - c;
      const maxQty  = Math.min(avail, space, Math.floor(S.cash / price));
      const canBuy  = maxQty > 0;

      let trendHTML = '';
      if (prev && price > prev) trendHTML = '<span class="trend trend-up">▲</span>';
      else if (prev && price < prev) trendHTML = '<span class="trend trend-down">▼</span>';

      const halfPrice  = Math.round(price / 2);
      const canConnect = S.has_supplier && !S.supplier_used_today && space > 0 && S.cash >= halfPrice;
      const connectBtn = S.has_supplier
        ? `<button class="qty-btn" onclick="supplierBuy('${d.name}')" style="border-color:#4a3a7a;color:#b090f0" ${canConnect ? '' : 'disabled'} title="Buy at 50% via connect">${S.supplier_used_today ? 'USED' : 'CONNECT'}</button>`
        : '';

      const row = document.createElement('div');
      row.className = 'drug-row';
      row.innerHTML = `
        <div>
          <div class="drug-name">${d.name} <span class="drug-alias">${d.street}</span></div>
          <div class="drug-avail">${avail} available</div>
        </div>
        <div class="drug-price${isHigh ? ' high' : ''}">${fmt(price)}${trendHTML}</div>
        <div class="buy-group">
          <input class="qty-in" id="qty_${d.name}" type="number" value="1" min="1" max="${avail}" ${canBuy ? '' : 'disabled'}>
          <button class="qty-btn" onclick="buyDrug('${d.name}')" ${canBuy ? '' : 'disabled'}>BUY</button>
          <button class="qty-btn" onclick="buyMax('${d.name}')" style="border-color:#3a5a2a;color:var(--green)" ${canBuy ? '' : 'disabled'} title="Buy as much as possible">MAX</button>
          ${connectBtn}
        </div>`;
      ml.appendChild(row);
    });
    if (!count) {
      ml.innerHTML = '<div style="color:var(--muted);padding:10px 0">No supply here today. Travel somewhere.</div>';
    }
  }

  function renderStash() {
    const sl   = document.getElementById('stashList');
    const keys = Object.keys(S.stash || {}).filter(k => S.stash[k] > 0);
    if (!keys.length) {
      sl.innerHTML  = '';
      sl.style.color = 'var(--muted)';
      sl.textContent = 'Empty pockets.';
      return;
    }
    sl.innerHTML   = '';
    sl.style.color = 'var(--text)';
    keys.forEach(name => {
      const qty       = S.stash[name];
      const sellPrice = S.prices && S.prices[name];
      const avg       = S.avg_cost && S.avg_cost[name];
      let profitHTML  = '';
      if (avg && sellPrice) {
        const pct   = Math.round(((sellPrice - avg) / avg) * 100);
        const color = pct >= 0 ? 'var(--green)' : 'var(--red)';
        const sign  = pct >= 0 ? '+' : '';
        profitHTML  = ` <span style="color:${color};font-size:11px">(${sign}${pct}%)</span>`;
      }
      const avgLine = avg ? `avg cost: ${fmt(avg)}${profitHTML}` : '';
      const row = document.createElement('div');
      row.className = 'owned-row';
      row.innerHTML = `
        <div>
          ${name} <span class="pill pill-good">x${qty}</span>
          <span style="font-size:11px;color:var(--muted);display:block;margin-top:2px">
            ${sellPrice ? 'sell @ ' + fmt(sellPrice) : 'no buyers here'}${avgLine ? ' &mdash; ' + avgLine : ''}
          </span>
        </div>
        <input class="qty-in" id="sqty_${name}" type="number" value="${qty}" min="1" max="${qty}">
        <button class="qty-btn" onclick="sellDrug('${name}')" ${sellPrice ? '' : 'disabled'}>SELL</button>`;
      sl.appendChild(row);
    });
  }

  function renderShop() {
    const list = document.getElementById('shopList');
    list.innerHTML = '';
    UPGRADES.forEach(u => {
      const owned     = S['has_' + u.id];
      const canAfford = S.cash >= u.price;
      const row = document.createElement('div');
      row.className = 'drug-row';
      row.innerHTML = `
        <div>
          <div class="drug-name">${u.label}</div>
          <div class="drug-avail">${u.desc}</div>
        </div>
        <div class="drug-price">${fmt(u.price)}</div>
        <div class="buy-group">
          <button class="qty-btn" onclick="buyUpgrade('${u.id}')" ${owned || !canAfford ? 'disabled' : ''}>${owned ? 'OWNED' : 'BUY'}</button>
        </div>`;
      list.appendChild(row);
    });
  }

  function renderCities() {
    const cg = document.getElementById('cityGrid');
    cg.innerHTML = '';
    const freeLeft = S.has_car ? Math.max(0, CAR_FREE_TRIPS - (S.car_trips_today || 0)) : 0;
    const travelTitle = document.getElementById('travelTitle');
    if (travelTitle) {
      travelTitle.innerHTML = `Travel &mdash; <span id="cityDisplay">${S.city}</span>`
        + (S.has_car ? ` <span style="color:var(--muted);font-size:13px">(${freeLeft} free trip${freeLeft !== 1 ? 's' : ''} left)</span>` : '');
    }
    CITIES.forEach(c => {
      const btn = document.createElement('div');
      btn.className = 'city-btn' + (c.name === S.city ? ' current' : '');
      btn.innerHTML = `
        <div class="city-name">${c.name}</div>
        <div class="city-desc">${c.name === S.city ? 'you are here' : c.desc}</div>`;
      if (c.name !== S.city) btn.onclick = () => travel(c.name);
      cg.appendChild(btn);
    });
  }

  function renderLog() {
    const log = document.getElementById('log');
    log.innerHTML = '';
    const styleMap = { red:'bad', green:'good', yellow:'warn', dim:'headline' };
    (S.log || []).forEach(([msg, style]) => {
      const d = document.createElement('div');
      d.className  = 'log-entry ' + (styleMap[style] || '');
      d.textContent = msg;
      log.appendChild(d);
    });
  }

  /* ─── TRAYS ─── */
  function closeTray() {
    document.querySelectorAll('.stat-tray').forEach(t => t.classList.remove('visible'));
  }
  function toggleTray(name) {
    const tray   = document.getElementById('tray-' + name);
    const isOpen = tray.classList.contains('visible');
    closeTray();
    if (!isOpen) tray.classList.add('visible');
  }

  /* ─── LAYOUT SYNC ─── */
  function syncTopSections() {
    const left  = document.getElementById('topLeft');
    const right = document.getElementById('topRight');
    if (!left || !right) return;
    left.style.minHeight  = '';
    right.style.minHeight = '';
    const h = Math.max(left.offsetHeight, right.offsetHeight);
    left.style.minHeight  = h + 'px';
    right.style.minHeight = h + 'px';
  }

  /* ─── KEYBOARD ─── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (!document.getElementById('inputOverlay').classList.contains('hidden')) confirmInput();
      if (!document.getElementById('eventOverlay').classList.contains('hidden'))  dismissEvent();
    }
    if (e.key === 'Escape') {
      closeInput();
      closeTray();
    }
  });

  /* ─── START ─── */
  openSettings();
</script>
</body>
</html>
