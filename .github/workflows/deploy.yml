name: Deploy to metacrystal.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@metacrystal.com <<'SFTP'
          put dopewars.html /home/nstrupp/metacrystal.com/dopewars.html
          put candywars.html /home/nstrupp/metacrystal.com/candywars.html
          SFTP

      - name: Confirm
        run: echo "✅ Deployed dopewars.html and candywars.html to metacrystal.com"
